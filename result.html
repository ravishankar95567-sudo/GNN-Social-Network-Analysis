<!DOCTYPE html>
<html>
<head>
    <title>Prediction Result</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Prediction Result</h1>
        <p><strong>Node ID:</strong> {{ node_id }}</p>
        <p><strong>Predicted Class:</strong> {{ predicted_class }}</p>
        <p><strong>Actual Class:</strong> {{ actual_class }}</p>

        <h2>Connected Neighbor Nodes</h2>
        <ul>
            {% for n in neighbors %}
                <li>Node {{ n.id }} → {{ n.class }}</li>
            {% endfor %}
        </ul>

        <h2>Reason</h2>
        <p>{{ reason }}</p>

        <a href="/">Try Another Node</a>
    </div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>GNN Prediction</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(to right, #1e3c72, #2a5298);
            color: white;
        }
        .box {
            margin-top: 120px;
            padding: 40px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="box text-center">
        <h1>GNN Node Classification</h1>
        <form action="/predict" method="post">
            <input type="number" name="node" class="form-control mb-3" placeholder="Enter Node ID" required>
            <button class="btn btn-primary">Predict</button>
        </form>
    </div>
</div>
</body>
</html>
